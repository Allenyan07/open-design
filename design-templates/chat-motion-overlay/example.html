<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat Motion Overlay — example</title>
    <style>
      :root {
        --bg: #0e0d0c;
        --panel: #1a1816;
        --ink: #f5efe5;
        --muted: #8b8579;
        --accent: #07c160;
        --left-bubble: #ffffff;
        --left-text: #1a1a1a;
        --right-bubble: #95ec69;
        --right-text: #1a1a1a;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink);
        font-family: -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; }
      body { min-height: 100dvh; display: grid; place-items: center; padding: 32px; }
      .stage {
        width: min(420px, 92vw);
        background: var(--panel);
        border-radius: 8px;
        padding: 22px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      }
      .phone {
        position: relative;
        width: 260px;
        height: 480px;
        margin: 0 auto;
        background: #ededed;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      }
      .phone::before {
        content: "";
        position: absolute;
        top: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 22px;
        background: #1a1a1a;
        border-radius: 14px;
        z-index: 10;
      }
      .header {
        background: #ededed;
        padding: 36px 12px 8px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: #1a1a1a;
        border-bottom: 1px solid #dcdcdc;
      }
      .chat-body {
        padding: 12px 8px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .row {
        display: flex;
        align-items: flex-end;
        gap: 6px;
      }
      .row.right {
        flex-direction: row-reverse;
      }
      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 6px;
        flex-shrink: 0;
        background-size: cover;
        background-position: center;
      }
      .avatar-1 { background: linear-gradient(135deg, #ffb6c1, #ff8fa3); }
      .avatar-2 { background: linear-gradient(135deg, #ffd580, #f0a050); }
      .bubble {
        max-width: 160px;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.5;
        position: relative;
      }
      .bubble.left {
        background: var(--left-bubble);
        color: var(--left-text);
      }
      .bubble.right {
        background: var(--right-bubble);
        color: var(--right-text);
      }
      .bubble.highlight {
        box-shadow: 0 0 0 2px var(--accent);
      }
      .row-enter {
        animation: pop 0.5s ease both;
      }
      .row-enter:nth-child(2) { animation-delay: 0.15s; }
      .row-enter:nth-child(3) { animation-delay: 0.3s; }
      .row-enter:nth-child(4) { animation-delay: 0.45s; }
      .row-enter:nth-child(5) { animation-delay: 0.6s; }
      @keyframes pop {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .meta {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: end;
        margin-top: 18px;
      }
      .title { font-size: 20px; line-height: 1.1; margin: 0; }
      .sub {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="phone">
        <div class="header">闺蜜群（6）</div>
        <div class="chat-body">
          <div class="row row-enter">
            <div class="avatar avatar-1"></div>
            <div class="bubble left">今天没运动</div>
          </div>
          <div class="row row-enter">
            <div class="avatar avatar-1"></div>
            <div class="bubble left">加一个拉粑粑记录</div>
          </div>
          <div class="row right row-enter">
            <div class="avatar avatar-2"></div>
            <div class="bubble right">好</div>
          </div>
          <div class="row right row-enter">
            <div class="avatar avatar-2"></div>
            <div class="bubble right highlight">他说怎么会有这么奇怪的需求</div>
          </div>
        </div>
      </div>
      <div class="meta">
        <h1 class="title">Animated chat overlay — transparent MOV ready for compositing.</h1>
        <span class="sub">Open Design · Video</span>
      </div>
    </div>
  </body>
</html>
